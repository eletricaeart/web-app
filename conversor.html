<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Conversor Elétrica & Art - Legado para JSON</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f4f7f6; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        h2 { color: #00559c; margin-top: 0; }
        textarea { width: 100%; height: 180px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-family: monospace; margin-bottom: 20px; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        .btn-convert { background-color: #00559c; color: white; }
        .btn-convert:hover { background-color: #003d7a; }
        
        .btn-copy { background-color: #28a745; color: white; display: none; }
        .btn-copy:hover { background-color: #218838; }

        .result-container { margin-top: 30px; overflow-x: auto; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #eee; position: sticky; top: 0; }
        .copy-hint { color: #666; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔄 Conversor de Entidades (Legado -> 3 Colunas)</h2>
    <p class="copy-hint">Cole os dados copiados do Google Sheets (incluindo o cabeçalho):</p>
    
    <textarea id="inputData" placeholder="Cole aqui as linhas da sua planilha antiga..."></textarea>
    
    <div class="btn-group">
        <button class="btn-convert" onclick="converterDados()">Converter Dados</button>
        <button id="btnCopy" class="btn-copy" onclick="copiarTudo()">📋 Copiar Resultado para o Sheets</button>
    </div>

    <div class="result-container" id="resultArea" style="display:none;">
        <h3>✅ Resultado Convertido</h3>
        <p class="copy-hint">Os dados abaixo já estão prontos para a nova estrutura:</p>
        <table id="outputTable">
            <thead>
                <tr>
                    <th>id</th>
                    <th>created_at</th>
                    <th>data (json)</th>
                </tr>
            </thead>
            <tbody id="outputBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Variável global para armazenar a string de cópia
    let stringParaCopiar = "";

    function converterDados() {
        const rawInput = document.getElementById('inputData').value.trim();
        if (!rawInput) return alert("Por favor, cole os dados primeiro!");

        const lines = rawInput.split('\n');
        const delimiter = rawInput.includes('\t') ? '\t' : ',';
        
        const headers = lines[0].split(delimiter).map(h => h.trim());
        const body = lines.slice(1);
        const outputBody = document.getElementById('outputBody');
        
        outputBody.innerHTML = '';
        stringParaCopiar = ""; // Limpa a memória de cópia anterior

        body.forEach(line => {
            if (!line.trim()) return;

            const cells = line.split(delimiter).map(c => c.trim());
            let id = cells[0];
            let createdAt = new Date().toISOString();
            let dataObj = {};

            headers.forEach((header, index) => {
                const value = cells[index] || "";
                
                // Extração inteligente de data
                if (header.toLowerCase() === 'createdat' || header.toLowerCase() === 'updatedat' || header.toLowerCase() === 'data') {
                    if (value && value.length > 5) createdAt = value;
                }

                // Colocamos no JSON tudo exceto o ID (que já tem coluna própria)
                if (index !== 0) {
                    dataObj[header] = value;
                }
            });

            const jsonString = JSON.stringify(dataObj);

            // 1. Adiciona à visualização na tela
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${id}</td><td>${createdAt}</td><td>${jsonString}</td>`;
            outputBody.appendChild(tr);

            // 2. Adiciona à string de cópia (usando \t para o Sheets entender as colunas)
            stringParaCopiar += `${id}\t${createdAt}\t${jsonString}\n`;
        });

        // Mostra a área de resultado e o botão de copiar
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('btnCopy').style.display = 'inline-block';
    }

    async function copiarTudo() {
        if (!stringParaCopiar) return;

        try {
            await navigator.clipboard.writeText(stringParaCopiar);
            const btn = document.getElementById('btnCopy');
            const originalText = btn.innerText;
            
            // Feedback visual de sucesso
            btn.innerText = "✅ Copiado!";
            btn.style.backgroundColor = "#218838";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "#28a745";
            }, 2000);
            
        } catch (err) {
            alert("Erro ao copiar: " + err);
        }
    }
</script>

</body>
</html>
